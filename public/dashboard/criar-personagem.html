    function atualizaTxt(ipt, div){
        let placeholder = (Math.floor(Number(ipt.value)/2))-5

        if(placeholder > 0){
            div.innerHTML = `+${placeholder}`
        } else {
            div.innerHTML = placeholder
        }
    }

    function criarPersonagem(){
        let funcionou = false

        let nomeNovo = ipt_nome.value
        let racaNovo = ipt_raca.value
        let classeNovo = ipt_classe.value
        let vidaNovo = hp()
        let forcNovo = ipt_for.value
        let dexNovo = ipt_dex.value
        let consNovo = ipt_const.value
        let intNovo = ipt_int.value
        let sabNovo = ipt_sab.value
        let carNovo = ipt_car.value

        console.log(sessionStorage.ID_USUARIO)
        console.log(nomeNovo)
        console.log(racaNovo)
        console.log(classeNovo)
        console.log(forcNovo)
        console.log(dexNovo)
        console.log(consNovo)
        console.log(intNovo)
        console.log(sabNovo)
        console.log(carNovo)
        console.log(vidaNovo)
        fetch("/personagens/cadastrarPersonagem", {
            method: "POST",
            headers: {
                "Content-Type":"application/json",
            },
            body: JSON.stringify({
                playerId: sessionStorage.ID_USUARIO,
                nome: nomeNovo,
                raca: racaNovo,
                classe: classeNovo,
                forc: forcNovo,
                des: dexNovo,
                cons: consNovo,
                intel: intNovo,
                sab: sabNovo,
                car: carNovo,
                hp_total: vidaNovo
            })
        }).then(function (resposta) {
                console.log("resposta: ", resposta);

                    console.log("Personagem cadastrado!")
                    funcionou = true
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
       setTimeout(() => {atualizarPericias()}, 500) 
       setTimeout(() => {window.location = "./dashboard/personagens.html"}, 1000)
    }

    function atualizarPericias(){
        fetch("/personagens/cadastrarPericias", {

            },

                nome: ipt_nome.value,
                acrobacia: acrobaciaPersonagem,

    function hp(){
        let hp_total = 0
        let bonusHp = (Math.floor(ipt_const.value)/2)-5
        classe = ipt_classe.value

        if (classe == 'barbaro') {
            hp_total = 12 + bonusHp
            hp_total = Number(hp_total)
        } else if (classe == 'patrulheiro' || classe == 'paladino' || classe == 'guerreiro') {
            hp_total = 10 + bonusHp
            hp_total = Number(hp_total)
        } else if (classe == 'mago' || classe == 'feiticeiro') {
            hp_total = 6 + bonusHp
            hp_total = Number(hp_total)
        } else {
            hp_total = 8 + bonusHp
            hp_total = Number(hp_total)
        }
        return hp_total
